{% for person in include.group %}
<div class="col-2 col-6-narrower">
	<div class="card">
		<div class="photo-container">
			{% if person.photo and person.photo != "" %}
				<img src="{{ person.photo }}" alt="{{ person.name }}" class="photo">
			{% elsif person.picture and person.picture != "" %}
				<img src="{{ '/images/members/' | append: person.picture | relative_url }}" alt="{{ person.name }}" class="photo">
			{% else %}
				<img src="{{ '/images/members/avatar.png' | relative_url }}" alt="{{ person.name }}" class="photo">
			{% endif %}
			<div class="middle">
				<div class="text hyphenation">{{ person.area }}</div>
			</div>
		</div>
		<div class="text-container">
			<a href="{{ person.website }}">
				<h2 id="{{ person.name | replace: ' ', '_' }}">{{ person.name }}</h2>
			</a>
		</div>
	</div>
</div>
{% endfor %}
