<header id="header"{% if page.header_alt %} class="alt"{% endif %}>
	<h1 id="logo">
		<a href="{{ '/' | relative_url }}" class="shield-link" aria-label="HCI Group at Johns Hopkins University">
			<img src="{{ '/images/white-shield.png' | relative_url }}" alt="Johns Hopkins University" class="jhu-shield">
		</a>
		<span class="logo-divider"></span>
		<a href="{{ '/' | relative_url }}" class="unit-link">
			<span class="unit-name">HCI Group</span>
			<span class="unit-sub">Johns Hopkins University</span>
		</a>
	</h1>
	<nav id="nav">
		<ul>
			<li{% if page.url == '/' or page.url == '/index.html' %} class="current"{% endif %}>
				<a href="{{ '/' | relative_url }}">Home</a>
			</li>
			<li{% if page.url contains 'people' %} class="current"{% endif %}>
				<a href="{{ '/people.html' | relative_url }}">People</a>
			</li>
			<li{% if page.url contains 'courses' %} class="current"{% endif %}>
				<a href="{{ '/courses.html' | relative_url }}">Courses</a>
			</li>
			<li{% if page.url contains 'seminar' %} class="current"{% endif %}>
				<a href="{{ '/seminar.html' | relative_url }}">Seminars</a>
			</li>
		</ul>
	</nav>
</header>
