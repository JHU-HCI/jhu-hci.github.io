title: "HCI @ Johns Hopkins University"
description: "Placing People at the Center of Technological Innovation"
url: "https://hci.jhu.edu"
baseurl: ""

# Coming Soon mode: when true, all pages show only the logo and a coming soon message
coming_soon: true

# Collections
collections:
  people:
    output: false
    sort_by: order
  courses:
    output: false
    sort_by: order
  seminars:
    output: false
    sort_by: order

# Build settings
markdown: kramdown

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - redirects.yml
  - README.txt
  - LICENSE.txt
  - assets/sass/
  - left-sidebar.html
  - right-sidebar.html
  - no-sidebar.html

# Plugins
plugins:
  - jekyll-seo-tag
